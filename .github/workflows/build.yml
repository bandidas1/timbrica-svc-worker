name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "handler_*.py"
      - "svc_io.py"
      - "bake_*.py"
      - "Dockerfile.*"
      - "requirements-*.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Independent images — one engine failing must not cancel the other.
      fail-fast: false
      matrix:
        include:
          - engine: seedvc
            dockerfile: Dockerfile.seedvc
          - engine: soulx
            dockerfile: Dockerfile.soulx
    name: build ${{ matrix.engine }}
    steps:
      - uses: actions/checkout@v4

      # torch + CUDA + baked checkpoints run to many GB — free the runner disk first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Two tags on purpose. The moving one (`:seedvc`) is convenient to pull by hand; the
      # immutable one (`:seedvc-<sha>`) is what you resolve to a digest and pin a RunPod
      # template at. The templates hold `...@sha256:<digest>`, so a rebuild reaches nothing
      # until the template's imageName is updated — 2026-07-09 a rebuilt `:soulx` plus a
      # workersMax 0→2 cycle still answered with the previous handler, because the digest
      # never moved. Updating the template is also not enough on its own: an already-running
      # worker keeps its container, so drain to workersMax 0 (watch /health until
      # workers.ready is 0) before scaling back up.
      - name: Build and push (${{ matrix.engine }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/timbrica-svc-worker:${{ matrix.engine }}
            ghcr.io/${{ github.repository_owner }}/timbrica-svc-worker:${{ matrix.engine }}-${{ github.sha }}
          provenance: false

      - name: Image ref to pin the RunPod template at
        run: |
          echo "::notice title=Resolve this tag to a digest and pin the template at it::ghcr.io/${{ github.repository_owner }}/timbrica-svc-worker:${{ matrix.engine }}-${{ github.sha }}"
