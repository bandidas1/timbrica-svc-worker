name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "handler_*.py"
      - "bake_*.py"
      - "Dockerfile.*"
      - "requirements-*.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Independent images — one engine failing must not cancel the other.
      fail-fast: false
      matrix:
        include:
          - engine: seedvc
            dockerfile: Dockerfile.seedvc
          - engine: soulx
            dockerfile: Dockerfile.soulx
    name: build ${{ matrix.engine }}
    steps:
      - uses: actions/checkout@v4

      # torch + CUDA + baked checkpoints run to many GB — free the runner disk first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.engine }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/timbrica-svc-worker:${{ matrix.engine }}
          provenance: false
